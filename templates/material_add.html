<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School11 HUB — Добавить материал</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏫 School11 HUB</div>
            <div class="user-info">
                👋 {{ user }}
            </div>
            <div class="nav">
                <a href="/main">Главная</a>
                <a href="/materials">Материалы</a>
                <a href="/tests">Тесты</a>
                <a href="/logout">Выйти</a>
            </div>
        </div>

        <div style="padding: 20px 0;">
            <div class="form-container" style="max-width: 700px;">
                <h2 style="text-align: center; margin-bottom: 30px; color: #667eea;">📖 Добавить материал</h2>

                <form id="material-form">
                    <div class="form-group">
                        <label>Название материала</label>
                        <input type="text" id="name" placeholder="Например: Презентация по теме 'Present Simple'" required>
                    </div>

                    <div class="form-group">
                        <label>Предмет</label>
                        <select id="school_subject" required>
                            <option value="">Выберите предмет</option>
                            <option value="english">🇬🇧 Английский язык</option>
                            <option value="chinese">🇨🇳 Китайский язык</option>
                            <option value="russian">🇷🇺 Русский язык</option>
                            <option value="math">📐 Математика</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Класс</label>
                        <select id="school_class" required>
                            <option value="">Выберите класс</option>
                            <option value="5">5 класс</option>
                            <option value="6">6 класс</option>
                            <option value="7">7 класс</option>
                            <option value="8">8 класс</option>
                            <option value="9">9 класс</option>
                            <option value="10">10 класс</option>
                            <option value="11">11 класс</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Текст материала</label>
                        <textarea id="text" placeholder="Введите текст материала, ссылки или описание..." rows="10" required></textarea>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit">Сохранить материал</button>
                        <a href="/materials" class="btn btn-outline">Отмена</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="footer">
            © 2025 School11 HUB — Образовательный портал
        </div>
    </div>

    <script>
        document.getElementById('material-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                name: document.getElementById('name').value,
                school_subject: document.getElementById('school_subject').value,
                school_class: parseInt(document.getElementById('school_class').value),
                text: document.getElementById('text').value
            };

            try {
                const response = await fetch('/data/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                console.log('Ответ сервера:', result);

                if (result.message === "information added successfully") {
                    alert('Материал успешно добавлен!');
                    window.location.href = '/materials';
                } else {
                    alert('Ошибка при добавлении материала');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при добавлении материала');
            }
        });
    </script>
</body>
</html>
