<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School11 HUB — Регистрация</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏫 School11 HUB</div>
            <div class="nav">
                <a href="/">Главная</a>
                <a href="/login">Вход</a>
            </div>
        </div>

        <div style="text-align: center; padding: 40px 20px;">
            <div class="form-container">
                <h2 style="text-align: center; margin-bottom: 30px; color: #667eea;">📝 Регистрация</h2>

                <form id="register-form">
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="name" placeholder="Введите имя" required>
                    </div>

                    <div class="form-group">
                        <label>Фамилия</label>
                        <input type="text" id="surname" placeholder="Введите фамилию" required>
                    </div>

                    <div class="form-group">
                        <label>Отчество (необязательно)</label>
                        <input type="text" id="patronymic" placeholder="Введите отчество">
                    </div>

                    <div class="form-group">
                        <label>Класс</label>
                        <select id="class_name" required>
                            <option value="">Выберите класс</option>
                            <option value="5">5 класс</option>
                            <option value="6">6 класс</option>
                            <option value="7">7 класс</option>
                            <option value="8">8 класс</option>
                            <option value="9">9 класс</option>
                            <option value="10">10 класс</option>
                            <option value="11">11 класс</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="password" placeholder="Введите пароль" required>
                    </div>

                    <div class="form-group">
                        <label>Подтвердите пароль</label>
                        <input type="password" id="confirm_password" placeholder="Повторите пароль" required>
                    </div>

                    <button type="submit" style="width: 100%;">Зарегистрироваться</button>
                </form>

                <p style="text-align: center; margin-top: 20px;">
                    Уже есть аккаунт? <a href="/login">Войти</a>
                </p>
            </div>
        </div>

        <div class="footer">
            © 2025 School11 HUB — Образовательный портал
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (password !== confirm) {
                alert('Пароли не совпадают');
                return;
            }

            const userData = {
                name: document.getElementById('name').value,
                surname: document.getElementById('surname').value,
                patronymic: document.getElementById('patronymic').value || null,
                class_name: document.getElementById('class_name').value,
                password: password
            };

            try {
                const response = await fetch('/create/user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();
                console.log('Ответ сервера:', result);

                if (result.success === true) {
                    alert('Регистрация успешна!');
                    window.location.href = '/login';
                } else {
                    alert(result.message || 'Ошибка при регистрации');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при регистрации. Проверьте подключение к серверу.');
            }
        });
    </script>
</body>
</html>
