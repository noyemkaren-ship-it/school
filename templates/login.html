<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School11 HUB — Вход</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏫 School11 HUB</div>
            <div class="nav">
                <a href="/">Главная</a>
                <a href="/register">Регистрация</a>
            </div>
        </div>

        <div style="text-align: center; padding: 40px 20px;">
            <div class="form-container">
                <h2 style="text-align: center; margin-bottom: 30px; color: #667eea;">Вход в систему</h2>

                <form id="login-form">
                    <div class="form-group">
                        <label>Фамилия</label>
                        <input type="text" id="surname" placeholder="Введите фамилию" required>
                    </div>

                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="password" placeholder="Введите пароль" required>
                    </div>

                    <button type="submit" style="width: 100%;">Войти</button>
                </form>

                <p style="text-align: center; margin-top: 20px;">
                    Нет аккаунта? <a href="/register">Зарегистрироваться</a>
                </p>
            </div>
        </div>

        <div class="footer">
            © 2025 School11 HUB — Образовательный портал
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const surname = document.getElementById('surname').value;
            const password = document.getElementById('password').value;

            const formData = new URLSearchParams();
            formData.append('surname', surname);
            formData.append('password', password);

            try {
                const response = await fetch('/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const result = await response.json();
                console.log('Ответ сервера:', result);

                if (result.success === true) {
                    window.location.href = '/main';
                } else {
                    alert(result.message || 'Неверная фамилия или пароль');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при входе. Проверьте подключение к серверу.');
            }
        });
    </script>
</body>
</html>
