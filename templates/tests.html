<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School11 HUB — Тесты</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏫 School11 HUB</div>
            <div class="user-info">
                👋 {{ user }}
            </div>
            <div class="nav">
                <a href="/main">Главная</a>
                <a href="/materials">Материалы</a>
                <a href="/results">Результаты</a>
                <a href="/mcko">МЦКО</a>
                <a href="/logout">Выйти</a>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: white;">📝 Доступные тесты</h2>
            <a href="/test/create" class="btn">+ Создать тест</a>
        </div>

        <div class="grid" id="tests-list">
            <div style="text-align: center; padding: 40px;">
                <div class="card" style="display: inline-block;">
                    <p>Загрузка тестов...</p>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2025 School11 HUB — Образовательный портал
        </div>
    </div>

    <script>
        async function loadTests() {
            try {
                const response = await fetch('/tests_list');
                const data = await response.json();

                const container = document.getElementById('tests-list');

                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; padding: 40px;">
                            <div class="card" style="display: inline-block;">
                                <p>📭 Пока нет тестов</p>
                                <a href="/test/create" class="btn" style="margin-top: 15px;">Создать первый тест</a>
                            </div>
                        </div>
                    `;
                    return;
                }

                let html = '';
                for (let test of data) {
                    html += `
                        <div class="card">
                            <h3>📋 ${test.name}</h3>
                            <p><strong>Предмет:</strong> ${test.subject}</p>
                            <p><strong>Класс:</strong> ${test.class}</p>
                            <p><strong>Вопросов:</strong> ${test.questions_count || 0}</p>
                            <a href="/test/${test.id}" class="btn" style="margin-top: 15px;">Пройти тест</a>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('tests-list').innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <div class="card" style="display: inline-block;">
                            <p>❌ Ошибка загрузки тестов</p>
                            <button onclick="loadTests()" class="btn" style="margin-top: 15px;">Повторить</button>
                        </div>
                    </div>
                `;
            }
        }

        loadTests();
    </script>
</body>
</html>
